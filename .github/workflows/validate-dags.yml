name: Validate Airflow DAGs

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate DAG Syntax
        run: |
          echo "Validating DAG Python syntax..."
          for file in dags/*.py; do
            echo "Checking $file..."
            python -m py_compile "$file" && echo "✅ $file is valid" || { echo "❌ $file has errors"; exit 1; }
          done
          echo "All DAGs passed syntax validation!"